<!-- ============ BACKGROUND ============ -->
<div class="bg-grid"></div>

<!-- ============ MAIN SCENE ============ -->
<div id="scene" class="scene">

  <!--
    The reactor-wrapper is a vertical flex column:
    [ARC REACTOR]
    [CLICK TO ENGAGE]
    [NAME STRIP - hidden until powered]
    [NAV TITLES - hidden until powered]
  -->
  <div id="reactor-wrapper" class="reactor-wrapper">

    <!-- ARC REACTOR -->
    <div id="reactor" class="reactor" onclick="handleReactorClick()">

      <!-- Outer casing ring -->
      <div class="outer-ring">
        <div class="bolt"></div><div class="bolt"></div>
        <div class="bolt"></div><div class="bolt"></div>
        <div class="bolt"></div><div class="bolt"></div>
        <div class="bolt"></div><div class="bolt"></div>
      </div>

      <!-- Mechanical track (spinning when powered) -->
      <div class="mech-track">
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
        <div class="mech-segment"></div>
      </div>

      <!-- Counter-rotating inner track -->
      <div class="mid-ring"></div>
      <div class="inner-track">
        <div class="inner-flare"></div>
        <div class="inner-flare"></div>
        <div class="inner-flare"></div>
        <div class="inner-flare"></div>
        <div class="inner-flare"></div>
        <div class="inner-flare"></div>
      </div>

      <!-- Triangle core -->
      <div class="core-wrap">
        <div class="core-glow-bg"></div>
        <div class="core-triangle"></div>
        <div class="core-inner-tri"></div>
        <div class="core-pulse"></div>
      </div>

    </div>

    <!-- Hint text -->
    <p id="click-hint" class="click-hint">CLICK TO ENGAGE</p>

    <!-- NAME STRIP — visible after power-on -->
    <div id="name-strip" class="name-strip">
      <p class="name-top">SRIKATHIRKAMANTHAN</p>
      <h1 class="name-big">AKAASS</h1>
      <p class="name-sub">DEVELOPER &nbsp;·&nbsp; DESIGNER &nbsp;·&nbsp; INNOVATOR</p>
    </div>

    <!-- NAV TITLES — visible after power-on -->
    <div id="nav-titles" class="nav-titles">
      <div class="nav-item" onclick="openSection('about')">
        <span class="nav-line"></span>
        <span class="nav-label">ABOUT ME</span>
      </div>
      <div class="nav-item" onclick="openSection('projects')">
        <span class="nav-line"></span>
        <span class="nav-label">PROJECTS</span>
      </div>
      <div class="nav-item" onclick="openSection('skills')">
        <span class="nav-line"></span>
        <span class="nav-label">SKILLS</span>
      </div>
      <div class="nav-item" onclick="openSection('contact')">
        <span class="nav-line"></span>
        <span class="nav-label">CONTACT</span>
      </div>
    </div>

  </div><!-- /reactor-wrapper -->

</div><!-- /scene -->

<!-- ============ MODAL OVERLAY ============ -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-panel" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
